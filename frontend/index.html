<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoGarage</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ハンバーガーメニュー -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">-- menu</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-section">
    <div class="drawer-section-label">-- tabs</div>
    <div id="tabList"></div>
    <button class="drawer-add-tab" onclick="addTab()">+ new tab</button>
  </div>
</div>

<!-- 長押しコンテキストメニュー -->
<div class="context-menu" id="contextMenu">
  <button onclick="renameTabFromMenu()">rename</button>
  <button onclick="deleteTabFromMenu()" class="danger">delete</button>
</div>

<!-- Tabline -->
<div class="tabline">
  <button class="hamburger" onclick="openDrawer()" title="menu">
    <span></span><span></span><span></span>
  </button>
  <div class="tabs-scroll" id="tabsScroll"></div>
  <div class="tab-spacer"></div>
  <div class="tab-right">
    <span style="color:var(--green)">● lua</span>
    <span id="count-display">0 videos</span>
  </div>
</div>

<!-- Add form (auto-hide) -->
<div class="add-form-bar" id="addFormBar">
  <div class="sec-comment" style="margin-bottom:8px">-- video gallery / add new entry</div>
  <div class="code-block" style="margin-bottom:0">
    <div class="code-line">
      <span class="kw">local</span>&nbsp;<span class="fn">add</span>&nbsp;=&nbsp;
      <input class="str-input" id="urlInput" type="text" placeholder='"https://youtube.com/watch?v=..."' autocomplete="off" />
      <input class="str-input title-input" id="titleInput" type="text" placeholder='"title (optional)"' autocomplete="off" />
      <button class="btn-exec" onclick="addVideo()">Add</button>
    </div>
  </div>
</div>

<div class="editor">
  <div class="line-nums" id="lineNums"></div>
  <div class="content">
    <div class="sec-comment">-- M.playlist = {</div>
    <div class="gallery" id="gallery"></div>
    <div class="sec-comment" style="margin-top:16px">-- }</div>
  </div>
</div>

<div class="statusline">
  <div class="sl-mode">NORMAL</div>
  <div class="sl-file" id="sl-file">video.lua</div>
  <div class="sl-spacer"></div>
  <div class="sl-right">
    <span id="sl-count">0:1</span>
    <span>utf-8</span>
    <span>lua</span>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.lua</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1a1b26;
    --bg2:      #16161e;
    --bg3:      #13131a;
    --surface:  #1f2335;
    --surface2: #24283b;
    --border:   #2a2e47;
    --blue:     #7aa2f7;
    --cyan:     #7dcfff;
    --green:    #9ece6a;
    --yellow:   #e0af68;
    --orange:   #ff9e64;
    --red:      #f7768e;
    --purple:   #bb9af7;
    --text:     #c0caf5;
    --muted:    #565f89;
    --comment:  #444b6a;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg3);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Tabline ── */
  .tabline {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: stretch;
    height: 38px;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    font-size: 12px;
    border-right: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
    user-select: none;
  }

  .tab.active {
    background: var(--bg);
    color: var(--text);
    border-bottom: 2px solid var(--blue);
    margin-bottom: -1px;
  }

  .tab .icon { color: var(--blue); }
  .tab.active .icon { color: var(--green); }
  .tab-spacer { flex: 1; }

  .tab-right {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--muted);
    gap: 16px;
  }

  /* ── Statusline ── */
  .statusline {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 26px;
    background: var(--blue);
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    z-index: 200;
    font-family: var(--mono);
  }

  .sl-mode {
    background: var(--bg2);
    color: var(--blue);
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 11px;
  }

  .sl-file { color: var(--bg2); padding: 0 14px; font-weight: 500; }
  .sl-spacer { flex: 1; }
  .sl-right { color: var(--bg2); padding: 0 14px; display: flex; gap: 16px; }

  /* ── Editor layout ── */
  .editor {
    display: flex;
    min-height: calc(100vh - 64px);
    padding-bottom: 26px;
  }

  .line-nums {
    width: 52px;
    flex-shrink: 0;
    padding: 24px 0;
    text-align: right;
    color: var(--comment);
    font-size: 12px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    user-select: none;
  }

  .line-num {
    padding: 0 10px 0 0;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .line-num.hl { color: var(--yellow); }

  .content {
    flex: 1;
    padding: 24px 32px 24px 24px;
    min-width: 0;
  }

  /* ── Section comments ── */
  .sec-comment {
    font-size: 12px;
    color: var(--comment);
    font-style: italic;
    margin-bottom: 10px;
    margin-top: 28px;
    user-select: none;
  }

  .sec-comment:first-child { margin-top: 0; }

  /* ── Add form ── */
  .code-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 20px;
    margin-bottom: 28px;
  }

  .code-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 13px;
    line-height: 2.2;
  }

  .kw { color: var(--purple); }
  .fn { color: var(--blue); }

  .str-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    flex: 1;
    min-width: 200px;
  }

  .str-input:focus { border-color: var(--blue); }
  .str-input::placeholder { color: var(--comment); font-style: italic; }

  .title-input { flex: 0.5; min-width: 140px; }

  .btn-exec {
    background: var(--blue);
    color: var(--bg2);
    border: none;
    border-radius: 4px;
    padding: 7px 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-exec:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-exec:active { transform: translateY(0); }

  /* ── Gallery ── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
  }

  .card:hover {
    border-color: var(--blue);
    box-shadow: 0 0 0 1px var(--blue), 0 8px 32px rgba(122,162,247,0.1);
    transform: translateY(-2px);
  }

  .card-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-r { background: var(--red); }
  .dot-y { background: var(--yellow); }
  .dot-g { background: var(--green); }

  .card-bar-title {
    flex: 1;
    color: var(--text);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 0 2px;
    transition: color 0.15s;
    line-height: 1;
    font-family: var(--mono);
  }

  .btn-delete:hover { color: var(--red); }

  .thumb-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: var(--bg3);
    overflow: hidden;
  }

  .thumb-wrap img {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }

  .thumb-wrap iframe {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .card.hovered .thumb-wrap img { opacity: 0; }
  .card.hovered .thumb-wrap iframe { opacity: 1; pointer-events: auto; }

  .play-btn {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }

  .play-btn svg { width: 48px; height: 48px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7)); transition: transform 0.2s; }
  .card:hover .play-btn svg { transform: scale(1.08); }
  .card.hovered .play-btn { opacity: 0; pointer-events: none; }

  .card-foot {
    padding: 7px 12px 9px;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 6px;
  }

  .vid-id { color: var(--yellow); }

  /* mobile */
  .card.active-mobile .thumb-wrap img { opacity: 0; }
  .card.active-mobile .thumb-wrap iframe { opacity: 1; pointer-events: auto; }
  .card.active-mobile .play-btn { opacity: 0; }

  @media (max-width: 640px) {
    .content { padding: 14px; }
    .gallery { grid-template-columns: 1fr; gap: 12px; }
    .line-nums { display: none; }
    .str-input { min-width: 100%; }
    .card.center-active {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px var(--cyan);
    }
  }

  /* ── Empty ── */
  .empty {
    grid-column: 1/-1;
    padding: 60px 20px;
    text-align: center;
    color: var(--comment);
    font-size: 12px;
    font-style: italic;
    line-height: 2.2;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 8px 20px;
    border-radius: 4px;
    font-size: 12px;
    font-family: var(--mono);
    z-index: 999;
    pointer-events: none;
    transition: transform 0.25s ease, opacity 0.25s;
    opacity: 0;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="tabline">
  <div class="tab active">
    <span class="icon">▸</span>
    <span>video.lua</span>
  </div>
  <div class="tab">
    <span class="icon">○</span>
    <span>init.lua</span>
  </div>
  <div class="tab-spacer"></div>
  <div class="tab-right">
    <span style="color:var(--green)">● lua</span>
    <span id="count-display">0 videos</span>
  </div>
</div>

<div class="editor">
  <div class="line-nums" id="lineNums"></div>

  <div class="content">
    <div class="sec-comment">-- video gallery / add new entry</div>

    <div class="code-block">
      <div class="code-line">
        <span class="kw">local</span>&nbsp;<span class="fn">add</span>&nbsp;=&nbsp;
        <input class="str-input" id="urlInput" type="text" placeholder='"https://youtube.com/watch?v=..."' autocomplete="off" />
        <input class="str-input title-input" id="titleInput" type="text" placeholder='"title (optional)"' autocomplete="off" />
        <button class="btn-exec" onclick="addVideo()"> Add </button>
      </div>
    </div>

    <div class="sec-comment">-- M.playlist = {</div>
    <div class="gallery" id="gallery"></div>
    <div class="sec-comment" style="margin-top:16px">-- }</div>
  </div>
</div>

<div class="statusline">
  <div class="sl-mode">NORMAL</div>
  <div class="sl-file">video.lua</div>
  <div class="sl-spacer"></div>
  <div class="sl-right">
    <span id="sl-count">0:1</span>
    <span>utf-8</span>
    <span>lua</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'nvim_vg_v1';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save(v) { localStorage.setItem(KEY, JSON.stringify(v)); }

let videos = load();

function extractId(url) {
  url = url.trim().replace(/^["']|["']$/g, '');
  const m = url.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
  return null;
}

function thumbUrl(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function embedUrl(id, muted=true) {
  return `https://www.youtube.com/embed/${id}?autoplay=1&mute=${muted?1:0}&controls=1&rel=0&modestbranding=1`;
}

function addVideo() {
  const urlEl = document.getElementById('urlInput');
  const titleEl = document.getElementById('titleInput');
  const url = urlEl.value.trim();
  const title = titleEl.value.trim().replace(/^["']|["']$/g, '');
  if (!url) { showToast('E: url required', true); return; }
  const id = extractId(url);
  if (!id) { showToast('E: invalid YouTube URL', true); return; }
  if (videos.find(v => v.id === id)) { showToast('W: already exists', true); return; }
  videos.unshift({ id, title: title || id, addedAt: Date.now() });
  save(videos);
  render();
  urlEl.value = '';
  titleEl.value = '';
  showToast('-- video added ✓');
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') addVideo(); });
document.getElementById('titleInput').addEventListener('keydown', e => { if (e.key === 'Enter') addVideo(); });

function deleteVideo(id) {
  videos = videos.filter(v => v.id !== id);
  save(videos);
  render();
  showToast('-- deleted');
}

function render() {
  const n = videos.length;
  document.getElementById('count-display').textContent = `${n} video${n !== 1 ? 's' : ''}`;
  document.getElementById('sl-count').textContent = `${n}:1`;

  const lines = 5 + Math.max(n * 3, 2);
  document.getElementById('lineNums').innerHTML =
    Array.from({length: lines}, (_, i) =>
      `<div class="line-num${i===1?' hl':''}">${i+1}</div>`
    ).join('');

  const gallery = document.getElementById('gallery');

  if (n === 0) {
    gallery.innerHTML = `<div class="empty">-- no videos yet<br>-- add a YouTube URL above</div>`;
    return;
  }

  gallery.innerHTML = videos.map(v => `
    <div class="card" id="card-${v.id}" data-id="${v.id}">
      <div class="card-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <div class="card-bar-title">${esc(v.title)}</div>
        <button class="btn-delete" onclick="event.stopPropagation();deleteVideo('${v.id}')" title=":bd">✕</button>
      </div>
      <div class="thumb-wrap">
        <img src="${thumbUrl(v.id)}" alt="${esc(v.title)}" loading="lazy">
        <iframe id="iframe-${v.id}" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="play-btn">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="30" fill="rgba(26,27,38,0.75)"/>
            <circle cx="30" cy="30" r="29" stroke="rgba(122,162,247,0.5)" stroke-width="1"/>
            <polygon points="24,18 46,30 24,42" fill="#7aa2f7"/>
          </svg>
        </div>
      </div>
      <div class="card-foot">
        <span style="color:var(--comment)">id =</span>
        <span class="vid-id">"${v.id}"</span>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    const iframe = card.querySelector('iframe');
    card.addEventListener('mouseenter', () => { iframe.src = embedUrl(id); card.classList.add('hovered'); });
    card.addEventListener('mouseleave', () => { card.classList.remove('hovered'); iframe.src = ''; });
    card.addEventListener('click', () => {
      if (window.innerWidth <= 640) {
        const already = card.classList.contains('active-mobile');
        document.querySelectorAll('.card.active-mobile').forEach(c => { c.classList.remove('active-mobile'); c.querySelector('iframe').src = ''; });
        if (!already) { iframe.src = embedUrl(id, false); card.classList.add('active-mobile'); }
      }
    });
  });

  if (window.innerWidth <= 640) setupCenter();
}

let st = null;
function setupCenter() {
  window.removeEventListener('scroll', onScroll);
  window.addEventListener('scroll', onScroll, { passive: true });
}
function onScroll() {
  clearTimeout(st);
  st = setTimeout(() => {
    const cy = window.innerHeight / 2;
    let best = null, dist = Infinity;
    document.querySelectorAll('.card').forEach(c => {
      const r = c.getBoundingClientRect();
      const d = Math.abs(r.top + r.height/2 - cy);
      if (d < dist) { dist = d; best = c; }
    });
    document.querySelectorAll('.card').forEach(c => c.classList.remove('center-active'));
    if (best) best.classList.add('center-active');
  }, 150);
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

render();
</script>
</body>
</html>
